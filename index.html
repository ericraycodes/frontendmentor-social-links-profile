<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Social links profile</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <!-- SOCIAL LINKS UI -->
    <main>
      <hgroup>
        <img alt="A profile picture." />
        <h1>Eric Ray Saladar</h1>
        <p>Davao del Sur, Philippines</p>
      </hgroup>

      <p>"Front-end web developer."</p>
      <div>
        <ul>
          <li><a>GitHub</a></li>
          <li><a>Frontend Mentor</a></li>
          <li><a>LinkedIn</a></li>
          <li><a>Twitter</a></li>
          <li><a>Instagram</a></li>
        </ul>
      </div>
    </main>

    <footer class="attribution">
      Challenge by
      <a
        href="https://www.frontendmentor.io/challenges/social-links-profile-UG32l9m6dQ"
        >Frontend Mentor</a
      >. Coded by
      <a
        href="https://github.com/ericraycodes/frontendmentor-social-links-profile"
        >Eric Ray Saladar</a
      >.
    </footer>
  </body>
</html>
